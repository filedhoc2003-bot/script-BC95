<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100 p-6">
    <div class="mx-auto max-w-3xl bg-white rounded-lg p-6">
      <h1 class="text-center text-green-500 text-2xl mb-4">DOM exercsie</h1>
      <!-- Bài 1: getelementById + innerText -->
      <div class="bg-blue-300 rounded-lg">
        <h2 class="font-bold text-indigo-500 md-2">
          Bài 1: getelementById + innerText
        </h2>
        <p id="text-result" class="bg-gray-300 p-3 rounded md-2">
          đây là nơi chứa
        </p>
        <button
          id="btn-result"
          class="bg-orange-400 text-white px-3 py-2 rounded-md"
        >
          Click
        </button>
      </div>
      <!-- bài số 2: giả lập flow login -->
      <div class="bg-blue-200 rounded-lg mt-6 p-4">
        <div>
          <label class="block text-sm font-medium mb-1">Chiều Dài:</label>
          <input
            type="number"
            id="input-chieudai"
            placeholder="Nhập chiều dài: "
            class="w-full border border-gray-600 rounded p-3"
          />
          <!-- thẻ p để hiển thị lỗi nếu có -->
          <p class="hidden bg-red-200 text-white p-3 rounded-lg mt-1"></p>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Chiều Rộng:</label>
          <input
            type="number"
            id="input-chieurong"
            placeholder=" nhập chiều rộng: "
            class="w-full border border-gray-600 rounded p-3"
          />
          <!-- thẻ p để hiển thị lỗi nếu có -->
          <p
            id="result-hcn"
            class="bg-red-200 text-white p-3 rounded-lg mt-1"
          ></p>
        </div>
        <button id="btn-hcn" class="bg-blue-500 text-white p-2 rounded-lg mt-2">
          Hiển Thị Kết Quả
        </button>
      </div>
      <!-- bài 4: tính tổng các số có 2 chữ số -->
      <div class="bg-blue-200 rounded-lg mt-6 p-4">
        <div>
          <label class="block text-sm font-medium mb-1">Tính Tổng:</label>
          <input
            type="number1"
            id="input-number"
            placeholder="Nhập number: "
            class="w-full border border-gray-600 rounded p-3"
          />

          <!-- thẻ p để hiển thị lỗi nếu có -->
          <p id="result-calc" class="bg-blue-200 p-3 rounded-lg mt-1"></p>
        </div>
        <button
          id="btn-calc"
          class="bg-blue-500 text-white p-2 rounded-lg mt-2"
        >
          Hiển Thị Kết Quả
        </button>
      </div>
    </div>
    <!-- thứ tự import file js -->
    <!-- những file ở cuối sẽ được ưu tiên nhất -->
    <!-- vd: các file thư viện sẽ ở trên đầu , của mình thì ở dưới cuối -->
    <script src="./js/index.js"></script>
    <script src="./js/bai2.js"></script>
    <script src="./js/baitap.js"></script>
    <script src="./js/if-else.js"></script>
    <script src="./js-1/test.js"></script>
    <script src="./js-1/loop.js"></script>
  </body>
</html>
